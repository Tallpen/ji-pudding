<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>吉的寶手作布丁兌換券</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FDF6E3;
    --cream-dark: #F5E6C0;
    --caramel: #C07C2A;
    --caramel-light: #E8A84A;
    --caramel-pale: #FAE8C0;
    --brown: #6B3F1A;
    --brown-light: #A0622A;
    --text: #3D2B0E;
    --text-muted: #9A7A50;
    --white: #FFFDF7;
    --border: #E2CC9A;
    --shadow: rgba(107, 63, 26, 0.12);
  }

  body {
    background: var(--cream);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .ticket-wrapper { max-width: 420px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 1.5rem; }
  .pudding-icon { font-size: 56px; line-height: 1; display: block; margin-bottom: 0.5rem; filter: drop-shadow(0 4px 8px var(--shadow)); }
  .brand { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 600; color: var(--brown); letter-spacing: 0.06em; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; }

  .ticket { background: var(--white); border-radius: 20px; border: 1.5px solid var(--border); overflow: hidden; box-shadow: 0 8px 32px var(--shadow), 0 2px 8px var(--shadow); }

  .ticket-top {
    background: linear-gradient(135deg, var(--caramel-pale) 0%, var(--cream-dark) 100%);
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1.5px dashed var(--border);
    position: relative;
  }
  .ticket-top::before, .ticket-top::after { content: ''; position: absolute; bottom: -12px; width: 24px; height: 24px; background: var(--cream); border-radius: 50%; border: 1.5px solid var(--border); }
  .ticket-top::before { left: -12px; }
  .ticket-top::after  { right: -12px; }

  .ticket-label { font-size: 11px; font-weight: 500; color: var(--caramel); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .ticket-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 600; color: var(--brown); line-height: 1.4; }
  .ticket-desc { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }

  /* 每張兌換的特別訊息 */
  .ticket-message {
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--brown);
    line-height: 1.6;
    display: none;
  }
  .ticket-message.show { display: block; }

  .counter-section { padding: 1.25rem 1.5rem 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--cream-dark); }
  .counter-label { font-size: 13px; color: var(--text-muted); }
  .counter-display { display: flex; align-items: baseline; gap: 4px; }
  .counter-num { font-family: 'Noto Serif TC', serif; font-size: 40px; font-weight: 600; color: var(--brown); line-height: 1; transition: all 0.3s ease; }
  .counter-total { font-size: 16px; color: var(--text-muted); }

  .dots-section { padding: 1rem 1.5rem 1.25rem; border-bottom: 1px solid var(--cream-dark); }
  .dots-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; margin-bottom: 10px; }
  .dots-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .dot { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .dot.active { background: var(--caramel-pale); border-color: var(--caramel-light); }
  .dot.used { background: var(--cream-dark); border-color: var(--border); opacity: 0.45; transform: scale(0.9); }

  .action-section { padding: 1.25rem 1.5rem; }
  .redeem-btn { width: 100%; background: var(--caramel); color: #FDF6E3; border: none; border-radius: 12px; padding: 14px 20px; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s, transform 0.1s; }
  .redeem-btn:hover:not(:disabled) { background: var(--brown-light); }
  .redeem-btn:active:not(:disabled) { transform: scale(0.98); }
  .redeem-btn:disabled { background: var(--cream-dark); color: var(--text-muted); cursor: not-allowed; }

  /* ── History ── */
  .history-section { margin-top: 1.5rem; background: var(--white); border-radius: 16px; border: 1.5px solid var(--border); overflow: hidden; box-shadow: 0 4px 16px var(--shadow); }
  .history-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--cream-dark); font-size: 13px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.04em; }
  .history-item { padding: 12px 1.25rem; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid var(--cream-dark); font-size: 13px; animation: fadeIn 0.3s ease; }
  .history-item:last-child { border-bottom: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .history-text { color: var(--brown); line-height: 1.5; flex: 1; padding-right: 12px; }
  .history-text strong { color: var(--caramel); font-weight: 600; }
  .history-time { color: var(--text-muted); font-size: 12px; white-space: nowrap; margin-top: 2px; }

  /* ── Admin panel ── */
  .admin-panel { margin-top: 1.5rem; background: var(--white); border-radius: 16px; border: 1.5px solid var(--caramel); overflow: hidden; box-shadow: 0 4px 16px var(--shadow); display: none; }
  .admin-panel.show { display: block; }
  .admin-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--cream-dark); font-size: 13px; font-weight: 500; color: var(--caramel); letter-spacing: 0.04em; }
  .admin-body { padding: 1rem 1.25rem; }
  .admin-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .admin-slider { width: 100%; margin-bottom: 8px; }
  .admin-value { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 600; color: var(--brown); text-align: center; margin-bottom: 12px; }
  .admin-btn { width: 100%; background: var(--caramel); color: var(--cream); border: none; border-radius: 8px; padding: 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .admin-btn:hover { background: var(--brown-light); }

  /* ── Confirm dialog ── */
  .dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(61,43,14,0.45); z-index: 300; align-items: center; justify-content: center; padding: 1rem; }
  .dialog-overlay.show { display: flex; }
  .dialog { background: var(--white); border-radius: 20px; border: 1.5px solid var(--border); padding: 1.75rem 1.5rem; max-width: 320px; width: 100%; box-shadow: 0 16px 48px rgba(61,43,14,0.2); }
  .dialog-icon { font-size: 40px; text-align: center; margin-bottom: 0.75rem; }
  .dialog-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 600; color: var(--brown); text-align: center; margin-bottom: 6px; }
  .dialog-body { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.6; margin-bottom: 1.25rem; }
  .dialog-btns { display: flex; gap: 8px; }
  .dialog-cancel { flex: 1; background: var(--cream-dark); color: var(--text-muted); border: 1px solid var(--border); border-radius: 10px; padding: 11px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .dialog-cancel:hover { background: var(--border); }
  .dialog-confirm { flex: 1; background: var(--caramel); color: var(--cream); border: none; border-radius: 10px; padding: 11px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .dialog-confirm:hover { background: var(--brown-light); }

  /* ── Qty selector & Memo ── */
  .qty-selector { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 1rem; }
  .qty-btn { width: 44px; height: 44px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--cream); color: var(--text); font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .qty-btn:hover { border-color: var(--caramel-light); background: var(--caramel-pale); }
  .qty-btn.selected { background: var(--caramel); border-color: var(--caramel); color: var(--cream); }
  
  .memo-area { margin-top: 1.25rem; text-align: left; }
  .memo-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--cream); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--text); resize: none; height: 60px; outline: none; transition: border-color 0.15s; }
  .memo-input:focus { border-color: var(--caramel); }
  .memo-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--brown); color: var(--cream); border-radius: 30px; padding: 10px 20px; font-size: 14px; white-space: nowrap; transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 200; box-shadow: 0 4px 16px rgba(61,43,14,0.25); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Loading ── */
  .loading { position: fixed; inset: 0; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.4s; }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading-icon { font-size: 48px; animation: bounce 1s ease infinite alternate
